services:
  modem:
    image: node:22-bookworm-slim
    container_name: modem-dev
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./:/app
      - modem_node_modules:/app/node_modules
      - ./data:/app/data
    devices:
      - "${MODEM_DEVICE:-/dev/ttyACM0}:${SERIAL_PATH:-/dev/ttyACM0}"
    command: sh -lc "yarn install --frozen-lockfile && yarn dev"

volumes:
  modem_node_modules:
