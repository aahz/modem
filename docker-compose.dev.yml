services:
  modem:
    image: node:22-bookworm-slim
    container_name: modem-dev
    working_dir: /app
    restart: unless-stopped
    ports:
      - "8086:8086"
      - "${SER2NET_PORT:-2000}:${SER2NET_PORT:-2000}"
    volumes:
      - ./:/app
      - modem_api_node_modules:/app/node_modules
      - ./data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=8086
      - SER2NET_HOST=0.0.0.0
      - SER2NET_PORT=${SER2NET_PORT:-2000}
      - ACQUIRE_TIMEOUT_MS=${ACQUIRE_TIMEOUT_MS:-30000}
    devices:
      - "${MODEM_DEVICE:-/dev/ttyACM0}:${SERIAL_PATH:-/dev/ttyACM0}"
    command: sh -lc "yarn install --frozen-lockfile && yarn dev"

  modem-ui:
    image: node:22-bookworm-slim
    container_name: modem-dev-ui
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - modem
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://modem:8086
    volumes:
      - ./:/app
      - modem_ui_node_modules:/app/node_modules
    command: sh -lc "yarn install --frozen-lockfile && yarn dev:ui --host 0.0.0.0 --port 5173"

volumes:
  modem_api_node_modules:
  modem_ui_node_modules:
